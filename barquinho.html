<!DOCTYPE html>
<html>
<head>
<title>Barquinho no Mar</title>
<style>
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body, html{
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
  }

  .sky{
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #87CEEB, #87CEFA);
    position: relative;
  }

  .sea{
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30%;
    background: #1E90FF;
    overflow: hidden;
  }

  .sea::before,
  .sea::after{
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3), transparent 70%);
    border-radius: 50%;
    animation: wave 6s infinite linear;
  }

  .sea::after{
    animation-delay: 3s;
  }

  @keyframes wave{
    0% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-25%) translateY(10px); }
    100% { transform: translateX(0%) translateY(0); }
  }

  .boat{
    position: absolute;
    bottom: 25%;
    left: -10%;
    width: 100px;
    height: 100px;
    background-image: url(../imgs/eb09f61bce360ad4561ef4a7a905edd9-navegacao-plana-de-iate.png); 
    background-size: contain;
    background-repeat: no-repeat;
    animation: moveBoat 10s linear infinite, sway 2s ease-in-out infinite alternate;
    z-index: 2;
  }

  @keyframes moveBoat{
    0% { left: -10%; }
    100% { left: 110%; }
  }

  @keyframes sway {
    0% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
    100% { transform: rotate(-5deg); }
  }

  .cloud{
    position: absolute;
    top: 10%;
    left: -20%;
    width: 150px;
    height: 80px;
    background: #fff;
    border-radius: 50px;
    box-shadow: 30px 20px 0px 0px #fff, 60px 10px 0px 0px #fff;
    animation: moveCloud 60s linear infinite;
    z-index: 1;
  }

  @keyframes moveCloud{
    0% { left: -20%; }
    100% { left: 120%; }
  }
</style>
</head>
<body>
  <div class="sky">
    <div class="cloud"></div>
    <div class="sea"></div>
    <div class="boat"></div>
  </div>
</body>
</html>
